spring:
  application:
    name: auth-service
  
  datasource:
    url: jdbc:mysql://localhost:3307/microservices_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.microservices: DEBUG
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] %-5p %logger{36} - %msg%n"